<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1920" viewBox="0 0 1080 1920">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a56db"/>
      <stop offset="100%" stop-color="#0c2a7a"/>
    </linearGradient>
  </defs>

  <!-- background gradient header -->
  <rect width="1080" height="640" fill="url(#bg)"/>
  <rect x="0" y="640" width="1080" height="1280" fill="#f7f9fc"/>

  <!-- status bar mock -->
  <text x="60" y="80" font-family="-apple-system, Segoe UI, sans-serif" font-size="32" font-weight="600" fill="#ffffff">9:41</text>
  <text x="1020" y="80" font-family="-apple-system, sans-serif" font-size="32" fill="#ffffff" text-anchor="end">●●●● 100%</text>

  <!-- title -->
  <text x="540" y="240" font-family="-apple-system, sans-serif" font-size="68" font-weight="800" fill="#ffffff" text-anchor="middle">PDF · HWP · DOC</text>
  <text x="540" y="320" font-family="-apple-system, sans-serif" font-size="68" font-weight="800" fill="#ffd166" text-anchor="middle">모두 한 번에</text>
  <text x="540" y="400" font-family="-apple-system, sans-serif" font-size="36" fill="#dbe7ff" text-anchor="middle">완전 무료 · 회원가입 없음</text>

  <!-- Hero CTA card -->
  <g transform="translate(120, 510)">
    <rect width="840" height="180" rx="24" fill="#ffffff"/>
    <rect x="40" y="40" width="100" height="100" rx="20" fill="#1a56db"/>
    <text x="90" y="108" font-family="sans-serif" font-size="56" fill="#ffffff" text-anchor="middle">📄</text>
    <text x="180" y="100" font-family="sans-serif" font-size="38" font-weight="700" fill="#0f172a">파일 열기</text>
    <text x="180" y="148" font-family="sans-serif" font-size="26" fill="#64748b">기기에서 문서를 선택하세요</text>
  </g>

  <!-- Recent files section -->
  <text x="60" y="800" font-family="sans-serif" font-size="40" font-weight="800" fill="#0f172a">최근 파일</text>

  <g transform="translate(60, 850)">
    <rect width="960" height="140" rx="18" fill="#ffffff"/>
    <rect x="30" y="25" width="90" height="90" rx="12" fill="#fef2f2"/>
    <text x="75" y="88" font-family="sans-serif" font-size="32" font-weight="800" fill="#dc2626" text-anchor="middle">PDF</text>
    <text x="150" y="68" font-family="sans-serif" font-size="32" font-weight="600" fill="#0f172a">2025_연간보고서.pdf</text>
    <text x="150" y="110" font-family="sans-serif" font-size="24" fill="#94a3b8">2.3 MB · 어제</text>
    <text x="900" y="88" font-family="sans-serif" font-size="40" fill="#facc15" text-anchor="middle">★</text>
  </g>

  <g transform="translate(60, 1010)">
    <rect width="960" height="140" rx="18" fill="#ffffff"/>
    <rect x="30" y="25" width="90" height="90" rx="12" fill="#f0fdf4"/>
    <text x="75" y="88" font-family="sans-serif" font-size="30" font-weight="800" fill="#16a34a" text-anchor="middle">HWP</text>
    <text x="150" y="68" font-family="sans-serif" font-size="32" font-weight="600" fill="#0f172a">기획서_v3.hwp</text>
    <text x="150" y="110" font-family="sans-serif" font-size="24" fill="#94a3b8">1.1 MB · 3일 전</text>
  </g>

  <g transform="translate(60, 1170)">
    <rect width="960" height="140" rx="18" fill="#ffffff"/>
    <rect x="30" y="25" width="90" height="90" rx="12" fill="#eff6ff"/>
    <text x="75" y="88" font-family="sans-serif" font-size="30" font-weight="800" fill="#2563eb" text-anchor="middle">DOC</text>
    <text x="150" y="68" font-family="sans-serif" font-size="32" font-weight="600" fill="#0f172a">계약서_초안.docx</text>
    <text x="150" y="110" font-family="sans-serif" font-size="24" fill="#94a3b8">340 KB · 1주 전</text>
    <text x="900" y="88" font-family="sans-serif" font-size="40" fill="#facc15" text-anchor="middle">★</text>
  </g>

  <g transform="translate(60, 1330)">
    <rect width="960" height="140" rx="18" fill="#ffffff"/>
    <rect x="30" y="25" width="90" height="90" rx="12" fill="#ecfeff"/>
    <text x="75" y="88" font-family="sans-serif" font-size="30" font-weight="800" fill="#0891b2" text-anchor="middle">XLS</text>
    <text x="150" y="68" font-family="sans-serif" font-size="32" font-weight="600" fill="#0f172a">매출_분석.xlsx</text>
    <text x="150" y="110" font-family="sans-serif" font-size="24" fill="#94a3b8">680 KB · 1주 전</text>
  </g>

  <!-- bottom tab bar -->
  <rect x="0" y="1760" width="1080" height="160" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
  <g transform="translate(140, 1800)">
    <rect width="160" height="80" rx="40" fill="#dbeafe"/>
    <text x="80" y="55" font-family="sans-serif" font-size="32" font-weight="700" fill="#1a56db" text-anchor="middle">홈</text>
  </g>
  <g transform="translate(420, 1800)">
    <text x="80" y="55" font-family="sans-serif" font-size="32" font-weight="600" fill="#94a3b8" text-anchor="middle">파일</text>
  </g>
  <g transform="translate(700, 1800)">
    <text x="80" y="55" font-family="sans-serif" font-size="32" font-weight="600" fill="#94a3b8" text-anchor="middle">설정</text>
  </g>
</svg>
