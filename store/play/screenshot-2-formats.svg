<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1920" viewBox="0 0 1080 1920">
  <rect width="1080" height="1920" fill="#f7f9fc"/>

  <!-- header gradient -->
  <defs>
    <linearGradient id="hg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a56db"/>
      <stop offset="100%" stop-color="#0c2a7a"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="1080" height="500" fill="url(#hg)"/>

  <text x="540" y="220" font-family="-apple-system, sans-serif" font-size="72" font-weight="800" fill="#ffffff" text-anchor="middle">8가지 문서 형식</text>
  <text x="540" y="320" font-family="-apple-system, sans-serif" font-size="40" fill="#dbe7ff" text-anchor="middle">한 앱에서 모두 열어보세요</text>

  <!-- 8 format cards (2x4 grid) -->
  <g font-family="sans-serif" font-weight="800" text-anchor="middle">
    <!-- Row 1 -->
    <g transform="translate(80, 580)">
      <rect width="220" height="220" rx="32" fill="#ef4444"/>
      <text x="110" y="120" font-size="56" fill="#ffffff">PDF</text>
      <text x="110" y="180" font-size="22" fill="#fff5f5" font-weight="500">.pdf</text>
    </g>
    <g transform="translate(330, 580)">
      <rect width="220" height="220" rx="32" fill="#16a34a"/>
      <text x="110" y="120" font-size="52" fill="#ffffff">HWP</text>
      <text x="110" y="180" font-size="22" fill="#f0fdf4" font-weight="500">.hwp</text>
    </g>
    <g transform="translate(580, 580)">
      <rect width="220" height="220" rx="32" fill="#2563eb"/>
      <text x="110" y="120" font-size="46" fill="#ffffff">DOCX</text>
      <text x="110" y="180" font-size="22" fill="#eff6ff" font-weight="500">.docx</text>
    </g>
    <g transform="translate(830, 580)">
      <rect width="220" height="220" rx="32" fill="#0891b2"/>
      <text x="110" y="120" font-size="46" fill="#ffffff">XLSX</text>
      <text x="110" y="180" font-size="22" fill="#ecfeff" font-weight="500">.xlsx</text>
    </g>

    <!-- Row 2 -->
    <g transform="translate(80, 850)">
      <rect width="220" height="220" rx="32" fill="#dc2626"/>
      <text x="110" y="120" font-size="46" fill="#ffffff">PPTX</text>
      <text x="110" y="180" font-size="22" fill="#fef2f2" font-weight="500">.pptx</text>
    </g>
    <g transform="translate(330, 850)">
      <rect width="220" height="220" rx="32" fill="#7c3aed"/>
      <text x="110" y="120" font-size="46" fill="#ffffff">EPUB</text>
      <text x="110" y="180" font-size="22" fill="#f5f3ff" font-weight="500">.epub</text>
    </g>
    <g transform="translate(580, 850)">
      <rect width="220" height="220" rx="32" fill="#64748b"/>
      <text x="110" y="120" font-size="56" fill="#ffffff">TXT</text>
      <text x="110" y="180" font-size="22" fill="#f1f5f9" font-weight="500">.txt</text>
    </g>
    <g transform="translate(830, 850)">
      <rect width="220" height="220" rx="32" fill="#f59e0b"/>
      <text x="110" y="120" font-size="42" fill="#ffffff">IMAGE</text>
      <text x="110" y="180" font-size="20" fill="#fffbeb" font-weight="500">.jpg .png</text>
    </g>
  </g>

  <!-- bullet features -->
  <g font-family="-apple-system, sans-serif" fill="#0f172a">
    <g transform="translate(80, 1200)">
      <circle cx="40" cy="40" r="32" fill="#dbeafe"/>
      <text x="40" y="55" font-size="32" font-weight="800" fill="#1a56db" text-anchor="middle">✓</text>
      <text x="100" y="35" font-size="34" font-weight="700">완전 무료</text>
      <text x="100" y="80" font-size="26" fill="#64748b">결제·구독 없음</text>
    </g>
    <g transform="translate(80, 1340)">
      <circle cx="40" cy="40" r="32" fill="#dbeafe"/>
      <text x="40" y="55" font-size="32" font-weight="800" fill="#1a56db" text-anchor="middle">✓</text>
      <text x="100" y="35" font-size="34" font-weight="700">완전 오프라인</text>
      <text x="100" y="80" font-size="26" fill="#64748b">파일은 기기 안에서만 처리</text>
    </g>
    <g transform="translate(80, 1480)">
      <circle cx="40" cy="40" r="32" fill="#dbeafe"/>
      <text x="40" y="55" font-size="32" font-weight="800" fill="#1a56db" text-anchor="middle">✓</text>
      <text x="100" y="35" font-size="34" font-weight="700">한국 HWP 네이티브</text>
      <text x="100" y="80" font-size="26" fill="#64748b">한글 문서 그대로 열림</text>
    </g>
    <g transform="translate(80, 1620)">
      <circle cx="40" cy="40" r="32" fill="#dbeafe"/>
      <text x="40" y="55" font-size="32" font-weight="800" fill="#1a56db" text-anchor="middle">✓</text>
      <text x="100" y="35" font-size="34" font-weight="700">가볍고 빠른 실행</text>
      <text x="100" y="80" font-size="26" fill="#64748b">노후 기기에서도 동작</text>
    </g>
  </g>
</svg>
