<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="500" viewBox="0 0 1024 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#4338CA"/>
    </linearGradient>
    <linearGradient id="paperBack" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#EEF2FF"/>
    </linearGradient>
    <linearGradient id="paperFront" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#FAFBFF"/>
    </linearGradient>
    <filter id="paperShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="6" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.30"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="topShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="12"/>
      <feOffset dx="0" dy="10" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.40"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1024" height="500" fill="url(#bg)"/>
  <circle cx="900" cy="80" r="160" fill="#FFFFFF" opacity="0.08"/>
  <circle cx="120" cy="450" r="200" fill="#FFFFFF" opacity="0.05"/>

  <!-- LEFT: title block (앱 톤 일치) -->
  <g transform="translate(60, 100)">
    <!-- Brand wordmark — 앱 헤더와 동일한 룩 -->
    <g transform="translate(0, 0)">
      <rect x="0" y="0" width="64" height="64" rx="16" fill="#FFFFFF" opacity="0.18"/>
      <text x="32" y="46" font-family="-apple-system, sans-serif" font-size="34" text-anchor="middle">📑</text>
    </g>
    <text x="84" y="46" font-family="-apple-system, Segoe UI, sans-serif" font-size="36" font-weight="800" fill="#FFFFFF" letter-spacing="-1">OpenDocs</text>

    <!-- Hero copy -->
    <text x="0" y="150" font-family="-apple-system, sans-serif" font-size="60" font-weight="800" fill="#FFFFFF" letter-spacing="-1.5">모든 문서를</text>
    <text x="0" y="220" font-family="-apple-system, sans-serif" font-size="60" font-weight="800" fill="#A5F3D0" letter-spacing="-1.5">한 번에 열다</text>

    <!-- Sub-line -->
    <text x="0" y="278" font-family="-apple-system, sans-serif" font-size="22" fill="#DBE2FF">PDF · HWP · Word · Excel · PPT · EPUB · 이미지</text>

    <!-- Trust badges (앱 헤더의 100% Local · Forever Free 와 동일 메시지) -->
    <g transform="translate(0, 312)">
      <rect x="0" y="0" width="180" height="42" rx="21" fill="#10B981" opacity="0.95"/>
      <text x="90" y="28" font-family="sans-serif" font-size="16" font-weight="700" fill="#FFFFFF" text-anchor="middle">🔒 100% Local</text>

      <rect x="192" y="0" width="180" height="42" rx="21" fill="#10B981" opacity="0.95"/>
      <text x="282" y="28" font-family="sans-serif" font-size="16" font-weight="700" fill="#FFFFFF" text-anchor="middle">🆓 Forever Free</text>
    </g>
  </g>

  <!-- RIGHT: 3 layered documents (아이콘과 동일한 시각언어) -->
  <g transform="translate(620, 60)">
    <!-- BACK doc -->
    <g transform="translate(20, 80) rotate(-8 130 175)" filter="url(#paperShadow)">
      <rect x="0" y="0" width="260" height="350" rx="20" fill="url(#paperBack)"/>
      <rect x="24" y="50" width="212" height="10" rx="5" fill="#C7D2FE"/>
      <rect x="24" y="76" width="170" height="10" rx="5" fill="#C7D2FE"/>
    </g>

    <!-- MIDDLE doc -->
    <g transform="translate(80, 60) rotate(6 130 175)" filter="url(#paperShadow)">
      <rect x="0" y="0" width="260" height="350" rx="20" fill="url(#paperFront)"/>
      <rect x="24" y="50" width="212" height="10" rx="5" fill="#A5B4FC"/>
      <rect x="24" y="76" width="148" height="10" rx="5" fill="#A5B4FC"/>
    </g>

    <!-- FRONT doc — polished -->
    <g transform="translate(50, 40)" filter="url(#topShadow)">
      <rect x="0" y="0" width="260" height="350" rx="22" fill="#FFFFFF"/>
      <!-- Title bar -->
      <rect x="24" y="40" width="120" height="20" rx="5" fill="#4F46E5"/>
      <rect x="24" y="72" width="80" height="9" rx="4" fill="#94A3B8"/>
      <!-- body lines -->
      <rect x="24" y="110" width="212" height="9" rx="4" fill="#E2E8F0"/>
      <rect x="24" y="132" width="200" height="9" rx="4" fill="#E2E8F0"/>
      <rect x="24" y="154" width="212" height="9" rx="4" fill="#E2E8F0"/>
      <rect x="24" y="176" width="170" height="9" rx="4" fill="#E2E8F0"/>
      <!-- sub-section -->
      <rect x="24" y="208" width="100" height="14" rx="4" fill="#4F46E5"/>
      <rect x="24" y="236" width="212" height="9" rx="4" fill="#E2E8F0"/>
      <rect x="24" y="258" width="180" height="9" rx="4" fill="#E2E8F0"/>
      <!-- mini bar chart -->
      <g transform="translate(24, 285)">
        <rect x="0"  y="32" width="32" height="34" rx="4" fill="#C7D2FE"/>
        <rect x="42" y="22" width="32" height="44" rx="4" fill="#A5B4FC"/>
        <rect x="84" y="12" width="32" height="54" rx="4" fill="#818CF8"/>
        <rect x="126" y="0" width="32" height="66" rx="4" fill="#4F46E5"/>
        <rect x="168" y="18" width="32" height="48" rx="4" fill="#A5B4FC"/>
      </g>
    </g>
  </g>
</svg>
