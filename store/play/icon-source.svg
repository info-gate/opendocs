<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#4338CA"/>
    </linearGradient>
    <linearGradient id="paperBack" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#EEF2FF"/>
    </linearGradient>
    <linearGradient id="paperFront" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#FAFBFF"/>
    </linearGradient>
    <filter id="paperShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="14"/>
      <feOffset dx="0" dy="10" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.32"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="topShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="20"/>
      <feOffset dx="0" dy="14" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.45"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect x="0" y="0" width="1024" height="1024" rx="224" fill="url(#bg)"/>

  <!-- Subtle highlight orb -->
  <circle cx="800" cy="220" r="200" fill="#FFFFFF" opacity="0.10"/>
  <circle cx="180" cy="850" r="160" fill="#FFFFFF" opacity="0.06"/>

  <!-- Stack of 3 documents (back-to-front, fanned) -->
  <!-- BACK doc — left tilt -->
  <g transform="translate(196, 280) rotate(-10 240 320)" filter="url(#paperShadow)">
    <rect x="0" y="0" width="480" height="600" rx="36" fill="url(#paperBack)"/>
    <rect x="44" y="80" width="392" height="14" rx="7" fill="#C7D2FE"/>
    <rect x="44" y="120" width="320" height="14" rx="7" fill="#C7D2FE"/>
  </g>

  <!-- MIDDLE doc — right tilt -->
  <g transform="translate(308, 248) rotate(8 240 320)" filter="url(#paperShadow)">
    <rect x="0" y="0" width="480" height="600" rx="36" fill="url(#paperFront)"/>
    <rect x="44" y="80" width="392" height="14" rx="7" fill="#A5B4FC"/>
    <rect x="44" y="120" width="280" height="14" rx="7" fill="#A5B4FC"/>
  </g>

  <!-- FRONT doc — straight, polished -->
  <g transform="translate(272, 220)" filter="url(#topShadow)">
    <rect x="0" y="0" width="480" height="600" rx="40" fill="#FFFFFF"/>

    <!-- Indigo title bar -->
    <rect x="44" y="56" width="220" height="32" rx="8" fill="#4F46E5"/>
    <rect x="44" y="100" width="140" height="14" rx="7" fill="#94A3B8"/>

    <!-- Body text rows -->
    <rect x="44" y="160" width="392" height="14" rx="7" fill="#E2E8F0"/>
    <rect x="44" y="196" width="368" height="14" rx="7" fill="#E2E8F0"/>
    <rect x="44" y="232" width="392" height="14" rx="7" fill="#E2E8F0"/>
    <rect x="44" y="268" width="320" height="14" rx="7" fill="#E2E8F0"/>

    <!-- Sub-section -->
    <rect x="44" y="328" width="160" height="22" rx="6" fill="#4F46E5"/>
    <rect x="44" y="376" width="392" height="14" rx="7" fill="#E2E8F0"/>
    <rect x="44" y="412" width="350" height="14" rx="7" fill="#E2E8F0"/>
    <rect x="44" y="448" width="280" height="14" rx="7" fill="#E2E8F0"/>

    <!-- Bottom: bar chart -->
    <g transform="translate(44, 492)">
      <rect x="0"   y="60" width="60" height="64" rx="8" fill="#C7D2FE"/>
      <rect x="80"  y="40" width="60" height="84" rx="8" fill="#A5B4FC"/>
      <rect x="160" y="20" width="60" height="104" rx="8" fill="#818CF8"/>
      <rect x="240" y="0"  width="60" height="124" rx="8" fill="#4F46E5"/>
      <rect x="320" y="30" width="60" height="94" rx="8" fill="#A5B4FC"/>
    </g>
  </g>
</svg>
