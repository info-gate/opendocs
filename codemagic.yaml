# Codemagic CI/CD — OpenDocs iOS build
# 참고: https://docs.codemagic.io/yaml/yaml-getting-started/
#
# 사용 흐름:
# 1. Codemagic UI → Add application → Connect to repository (info-gate/opendocs)
# 2. Auto-detect codemagic.yaml
# 3. Workflow "ios-release" 선택
# 4. App Store Connect API key + Apple cert/profile 업로드 필요 (Codemagic UI)
# 5. "Start new build" 클릭 → 30-40min 후 TestFlight 자동 업로드

workflows:
  ios-release:
    name: OpenDocs iOS Release
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: Codemagic Admin
    environment:
      groups:
        - opendocs_env
      # ios_signing 블록 제거 — Codemagic 자동 pre-flight check 가 실패 원인
      # (manual scripts 가 처리)
      vars:
        BUNDLE_ID: "com.wowpia.opendocs"
        XCODE_WORKSPACE: "ios/OpenDocs.xcworkspace"
        XCODE_SCHEME: "OpenDocs"
      node: 24
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: master
          include: true
    scripts:
      - name: Install npm dependencies
        script: |
          npm install --legacy-peer-deps
      - name: Expo prebuild (generates ios/ folder)
        script: |
          npx expo prebuild --platform ios --no-install --clean
      - name: Pod install
        script: |
          cd ios && pod install
      - name: Set up code signing (openssl key + ASC cert create)
        script: |
          set -e

          # 1. private key 즉시 생성 (openssl)
          PRIV_KEY=/tmp/cert_priv_key.pem
          openssl genrsa -out "$PRIV_KEY" 2048
          chmod 600 "$PRIV_KEY"

          # 2. 새 distribution cert 생성 + 위 key 사용 + .p12 저장
          #    IOS_DISTRIBUTION 한도(3개) 초과 시 DISTRIBUTION (Apple Distribution — universal) 폴백
          app-store-connect certificates create \
            --type IOS_DISTRIBUTION \
            --certificate-key=@file:"$PRIV_KEY" \
            --save \
          || (echo "IOS_DISTRIBUTION 한도 — Apple Distribution 폴백" && \
              app-store-connect certificates create \
                --type DISTRIBUTION \
                --certificate-key=@file:"$PRIV_KEY" \
                --save)

          # 3. profile fetch (없으면 생성) — 위 cert 자동 연결
          app-store-connect fetch-signing-files \
            "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create \
            --certificate-key=@file:"$PRIV_KEY"

          # 4. keychain 셋업
          keychain initialize
          keychain add-certificates

          # 5. .mobileprovision 을 Xcode project 에 적용
          xcode-project use-profiles
      - name: Build IPA (App Store)
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
